<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VesselHQ Login</title>
<style>
:root {
  --bg: #f2ebdf;
  --panel: #fffaf1;
  --ink: #182228;
  --muted: #5f6d72;
  --line: #d7ccb8;
  --accent: #cf762d;
  --accent-dark: #8f4d18;
  --bad: #a43f2f;
  --shadow: 0 24px 60px rgba(24,34,40,0.14);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Georgia,"Times New Roman",serif;color:var(--ink);background:
radial-gradient(circle at top left,rgba(207,118,45,0.14),transparent 24%),
linear-gradient(180deg,#f8f2e8 0%,var(--bg) 100%)}
main{width:min(460px,100%)}
.panel{background:var(--panel);border:1px solid rgba(24,34,40,0.08);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}
.band{padding:12px 20px;background:linear-gradient(135deg,#214a57,#163b45);color:#f8f5ee;font-size:11px;letter-spacing:.09em;text-transform:uppercase}
.body{padding:24px;display:grid;gap:16px}
h1{margin:0;font-size:36px;line-height:1.05;color:#163b45}
p{margin:0;color:var(--muted);line-height:1.6}
.field{display:grid;gap:6px}
label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#163b45}
input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fffdf9}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(207,118,45,0.12)}
button{border:0;border-radius:999px;padding:12px 18px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff8ef}
.error{padding:12px 14px;border-radius:14px;background:rgba(164,63,47,0.08);border:1px solid rgba(164,63,47,0.18);color:var(--bad);font-size:14px}
.hint{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<main>
  <section class="panel">
    <div class="band">VesselHQ Protected Access</div>
    <div class="body">
      <div>
        <h1>Sign In</h1>
        <p>Use your VesselHQ operator credentials to open dashboard, queue, history, and operational APIs.</p>
      </div>
      <div id="error-box" class="error" hidden>Login failed. Check username and password.</div>
      <form method="post" action="/login" style="display:grid;gap:14px">
        <input id="next" type="hidden" name="next" value="/dashboard">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit">Enter VesselHQ</button>
      </form>
      <div class="hint">If credentials are not configured in the server `.env`, login protection stays disabled.</div>
    </div>
  </section>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const next = params.get('next');
const error = params.get('error');

if (next) {
  document.getElementById('next').value = next;
}

if (error) {
  if (error === 'rate_limit') {
    document.getElementById('error-box').textContent = 'Too many login attempts. Wait a few minutes and try again.';
  }
  document.getElementById('error-box').hidden = false;
}
</script>
</body>
</html>
